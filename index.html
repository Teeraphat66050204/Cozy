<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozy Polaroid Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Prompt:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #fef6eb;
        --bg-2: #f3eadf;
        --paper: #fffaf4;
        --ink: #5a4639;
        --accent: #d38f75;
        --accent-soft: #edc5b4;
        --pin: #c16e59;
        --shadow: 0 14px 30px rgba(95, 66, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Prompt", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #fff7df 5%, transparent 50%),
          radial-gradient(circle at bottom left, #f8decf 8%, transparent 40%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(rgba(126, 87, 67, 0.08) 0.5px, transparent 0.5px);
        background-size: 5px 5px;
        opacity: 0.35;
      }

      .app {
        width: min(1100px, 92vw);
        margin: 28px auto 34px;
      }

      .hero {
        text-align: center;
        margin-bottom: 18px;
        animation: dropIn 0.75s ease-out;
      }

      h1 {
        margin: 0;
        font-family: "Patrick Hand", cursive;
        font-size: clamp(2rem, 5vw, 3.3rem);
        color: #73564b;
        letter-spacing: 1px;
      }

      .hero p {
        margin-top: 4px;
        font-size: 0.96rem;
      }

      .panel {
        background: rgba(255, 250, 244, 0.83);
        border: 1px solid rgba(198, 161, 137, 0.33);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 16px;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .panel-left {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      input[type="file"] {
        background: #fff;
        border: 1px dashed #be917d;
        border-radius: 12px;
        padding: 8px;
        width: min(360px, 100%);
        color: var(--ink);
      }

      input[type="text"] {
        border: 1px solid #d6b7a7;
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        width: min(280px, 100%);
        background: #fffefc;
        color: var(--ink);
      }

      button {
        border: 0;
        background: linear-gradient(120deg, var(--accent), #e2a88e);
        color: #fff9f5;
        padding: 11px 16px;
        border-radius: 999px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 6px 15px rgba(195, 121, 92, 0.35);
        transition: transform 0.18s ease, filter 0.18s ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: saturate(1.1);
      }

      button.secondary {
        background: #f3e5dc;
        color: #8f6452;
        box-shadow: none;
      }

      .wall {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 18px;
      }

      .empty {
        margin-top: 24px;
        padding: 28px;
        text-align: center;
        border-radius: 20px;
        border: 1px dashed #d9b9a8;
        background: rgba(255, 250, 245, 0.65);
      }

      .polaroid {
        background: var(--paper);
        border-radius: 4px;
        padding: 10px 10px 14px;
        box-shadow: 0 11px 22px rgba(78, 54, 43, 0.2);
        transform: rotate(var(--tilt));
        position: relative;
        animation: rise 0.45s ease both;
      }

      .polaroid::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--pin);
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: inset 0 -2px 3px rgba(0, 0, 0, 0.15);
      }

      .photo {
        width: 100%;
        aspect-ratio: 4/5;
        object-fit: cover;
        border-radius: 2px;
        background: #f0e4d9;
      }

      .caption {
        margin: 10px 4px 0;
        min-height: 28px;
        text-align: center;
        line-height: 1.3;
        font-family: "Patrick Hand", cursive;
        font-size: 1.2rem;
        color: #73564b;
        word-break: break-word;
      }

      .stamp {
        position: fixed;
        bottom: 12px;
        right: 14px;
        font-size: 0.74rem;
        opacity: 0.75;
      }

      @keyframes dropIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px) rotate(var(--tilt));
        }
        to {
          opacity: 1;
          transform: translateY(0) rotate(var(--tilt));
        }
      }

      @media (max-width: 780px) {
        .panel {
          grid-template-columns: 1fr;
        }

        .panel-left {
          flex-direction: column;
          align-items: stretch;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <main class="app">
      <section class="hero">
        <h1>Cozy Polaroid Wall</h1>
        <p>อัปโหลดรูปความทรงจำ แล้วแปะไว้บนกำแพงโพลารอยด์น่ารักๆ</p>
      </section>

      <section class="panel">
        <div class="panel-left">
          <input id="fileInput" type="file" accept="image/*" multiple />
          <input id="captionInput" type="text" maxlength="50" placeholder="เขียนแคปชัน (ไม่บังคับ)" />
        </div>
        <div>
          <button id="addBtn" type="button">เพิ่มรูป</button>
          <button id="clearBtn" class="secondary" type="button">ล้างทั้งหมด</button>
        </div>
      </section>

      <section id="emptyState" class="empty">ยังไม่มีรูปเลย ลองเพิ่มรูปแรกของคุณสิ</section>
      <section id="wall" class="wall"></section>
    </main>

    <div class="stamp">made with cozy moments</div>

    <script>
      const STORAGE_KEY = "cozy_polaroid_wall_v1";
      const MAX_PHOTOS = 80;
      const fileInput = document.getElementById("fileInput");
      const captionInput = document.getElementById("captionInput");
      const addBtn = document.getElementById("addBtn");
      const clearBtn = document.getElementById("clearBtn");
      const wall = document.getElementById("wall");
      const emptyState = document.getElementById("emptyState");

      let photos = [];

      function randomTilt() {
        return `${Math.floor(Math.random() * 10) - 5}deg`;
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(photos));
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          photos = raw ? JSON.parse(raw) : [];
        } catch {
          photos = [];
        }
      }

      function render() {
        wall.innerHTML = "";
        emptyState.style.display = photos.length ? "none" : "block";

        photos.forEach((item) => {
          const card = document.createElement("article");
          card.className = "polaroid";
          card.style.setProperty("--tilt", randomTilt());

          const img = document.createElement("img");
          img.className = "photo";
          img.alt = item.caption || "Polaroid photo";
          img.src = item.src;

          const caption = document.createElement("p");
          caption.className = "caption";
          caption.textContent = item.caption || "cozy day";

          card.append(img, caption);
          wall.appendChild(card);
        });
      }

      function readFiles(files) {
        return Promise.all(
          [...files].map(
            (file) =>
              new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result));
                reader.onerror = reject;
                reader.readAsDataURL(file);
              })
          )
        );
      }

      addBtn.addEventListener("click", async () => {
        const files = fileInput.files;
        if (!files || !files.length) return;

        const newImages = await readFiles(files);
        const caption = captionInput.value.trim();

        const newItems = newImages.map((src) => ({ src, caption }));
        photos = [...newItems, ...photos].slice(0, MAX_PHOTOS);
        save();
        render();

        fileInput.value = "";
        captionInput.value = "";
      });

      clearBtn.addEventListener("click", () => {
        photos = [];
        save();
        render();
      });

      load();
      render();
    </script>
  </body>
</html>
